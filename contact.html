---
layout: default
title: Contact
permalink: /contact/
---

<section class="section panel animate-on-scroll">
  <h1>Enquiry Form</h1>
  <p>
    This is a placeholder version of the enquiry form so we can match your current website form fields and submission flow in the next iteration.
  </p>

  <form class="form-grid" action="#" method="post">
    <div>
      <label for="name">Full Name</label>
      <input id="name" name="name" type="text" required />
    </div>

    <div>
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" required />
    </div>

    <div>
      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" type="tel" />
    </div>

    <div>
      <label for="event-type">Event Type</label>
      <select id="event-type" name="event-type">
        <option>Wedding</option>
        <option>Private Event</option>
        <option>Corporate Event</option>
        <option>Other</option>
      </select>
    </div>

    <div>
      <label for="event-date">Preferred Date</label>
      <input id="event-date" name="event-date" type="date" />
    </div>

    <div>
      <label for="guest-count">Estimated Guests</label>
      <input id="guest-count" name="guest-count" type="number" min="1" />
    </div>

    <div class="full">
      <label for="message">Tell Us About Your Plans</label>
      <textarea id="message" name="message" placeholder="Share your ideas, timeline, and any details you want us to know."></textarea>
    </div>

    <div class="full">
      <button type="submit">Send Enquiry</button>
    </div>
  </form>
</section>
