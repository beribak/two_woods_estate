---
layout: default
title: Contact
permalink: /contact/
---

{% assign contact = site.data.contact %}

<section class="section contact-info-section animate-on-scroll">
  <h1>Get In Touch</h1>
  <div class="contact-cards">

    <a class="contact-card" href="tel:+441234567890">
      <div class="contact-card__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="contact-card__body">
        <h3>Call Us</h3>
        <span>+44 (0) 1234 567 890</span>
      </div>
    </a>

    <a class="contact-card" href="mailto:{{ site.email }}">
      <div class="contact-card__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <div class="contact-card__body">
        <h3>Email Us</h3>
        <span>{{ site.email }}</span>
      </div>
    </a>

  </div>
</section>

<section class="section panel contact-form-section animate-on-scroll">
  <h2>{{ contact.content.heading }}</h2>
  <p>
    {{ contact.content.intro }}
  </p>

  <form class="form-grid" action="#" method="post">
    <div>
      <label for="name">Full Name</label>
      <input id="name" name="name" type="text" required />
    </div>

    <div>
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" required />
    </div>

    <div>
      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" type="tel" />
    </div>

    <div>
      <label for="event-type">Event Type</label>
      <select id="event-type" name="event-type">
        <option>Wedding</option>
        <option>Private Event</option>
        <option>Corporate Event</option>
        <option>Other</option>
      </select>
    </div>

    <div>
      <label for="event-date">Preferred Date</label>
      <input id="event-date" name="event-date" type="date" />
    </div>

    <div>
      <label for="guest-count">Estimated Guests</label>
      <input id="guest-count" name="guest-count" type="number" min="1" />
    </div>

    <div class="full">
      <label for="message">Tell Us About Your Plans</label>
      <textarea id="message" name="message" placeholder="Share your ideas, timeline, and any details you want us to know."></textarea>
    </div>

    <div class="full">
      <button type="submit">Send Enquiry</button>
    </div>
  </form>
</section>

<section class="section contact-map-section animate-on-scroll">
  <div class="map-address">
    {{ site.venue_address }}
  </div>
  <div id="contact-map"></div>
</section>

<script>
  function initMap() {
    // Coordinates for Two Woods Estate, Blackgate Lane, Pulborough, West Sussex, RH20 1DD
    // Update lat/lng if the pin needs adjusting
    var venueLocation = { lat: 50.9697, lng: -0.5065 };
    var map = new google.maps.Map(document.getElementById("contact-map"), {
      zoom: 14,
      center: venueLocation,
    });
    new google.maps.Marker({
      position: venueLocation,
      map: map,
      title: "Two Woods Estate",
    });
  }
</script>
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCz-xcf0xlJUBrTdSW7iHOgr8V3FImUsu4&callback=initMap"
></script>
