<script>
  function initMap() {
    var venueAddress = {{ site.venue_address | strip_html | strip_newlines | jsonify }};
    var fallbackLocation = { lat: 50.9854, lng: -0.4975 };
    var map = new google.maps.Map(document.getElementById("contact-map"), {
      zoom: 14,
      center: fallbackLocation,
      mapTypeId: "roadmap",
      mapTypeControl: false,
    });
    var marker = new google.maps.Marker({
      position: fallbackLocation,
      map: map,
      title: venueAddress,
    });

    if (!venueAddress) {
      return;
    }

    var geocoder = new google.maps.Geocoder();

    geocoder.geocode({
      address: venueAddress,
      region: "GB",
      componentRestrictions: { country: "GB" }
    }, function (results, status) {
      if (status === "OK" && results[0]) {
        map.setCenter(results[0].geometry.location);
        if (results[0].geometry.viewport) {
          map.fitBounds(results[0].geometry.viewport);
          map.setZoom(Math.min(map.getZoom(), 16));
        }
        marker.setPosition(results[0].geometry.location);
      } else {
        console.warn("Map geocoding failed for venue address:", status);
      }
    });
  }
</script>

<script
  src="https://app.sonas.events/formswidget.min.js"

<script
