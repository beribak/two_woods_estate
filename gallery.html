---
layout: default
title: Gallery
permalink: /gallery/
---

{% assign gallery = site.data.gallery %}

<section class="section panel">
  <h1>{{ gallery.content.heading }}</h1>
  <div class="gallery-grid">
    {% for image in gallery.content.images %}
      {% assign photographer = image.photographer | default: "" | strip %}
      <figure class="gallery-item image-with-credit">
        <img
          src="{{ image.image | relative_url }}"
          alt="{{ image.alt }}"
          {% if photographer != "" %}data-photographer="{{ photographer | escape }}"{% endif %}
        />
        {% if photographer != "" %}
          <figcaption class="image-credit">Photography by {{ photographer }}</figcaption>
        {% endif %}
      </figure>
    {% endfor %}
  </div>
</section>
