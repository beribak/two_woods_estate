intro:
  heading: "Weddings at Two Woods Estate"
  paragraphs:
    - "A truly magical 42-acre estate, exclusively yours for your wedding day."
    - "A Two Woods wedding effortlessly combines woodland beauty, wild meadows and outdoor dining. Whether you dream of a relaxed outdoor ceremony or a sophisticated celebration beneath the trees, Two Woods Estate creates the perfect backdrop - your wedding will feel intimate, romantic, and completely your own."
spaces:
  heading: "Wedding Spaces"
  cards:
