banner:
  image: "/assets/images/testemonials/Testimonial photo - charlotte and jerome.webp"
  alt: "Charlotte and Jerome testimonial photo"
  photographer: ""
  paragraphs:
    - "Two Woods Estate is the most gorgeous place I've ever been to. When my husband and I went to look around, we fell in love with all of it. It's absolutely breathtaking and so magical, the feeling of being there is something out of a fairytale."
    - "I don't even know where to begin in explaining how incredible Rob, Woody and the whole amazing team are. They worked the hardest I've ever seen a team work to make sure EVERYTHING was just perfect on the day, they are all super stars and made every second of our wedding day more than we could ever dream of. The way they went above and beyond for everything to run so smoothly and solve any problem there and then to make our day perfect was just the best. All my wedding suppliers said to me they have never worked at a venue where they are this great - so it really goes to show!"
    - "We really thank you with all our heart for making us have the best day of our lives, better than we could even imagined it to be so truly thank you. From the very start they were great, reliable, helpful, trusting, funny and cared through the whole journey of planning."
    - "We couldn't recommend Two Woods Estate enough and hope you let them make your special wedding day dreams come true!"
    - "Charlotte & Jerome"
