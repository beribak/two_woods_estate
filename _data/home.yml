intro:
  heading: "Welcome to Two Woods Estate"
  body: "Nestled in the heart of West Sussex, <strong>Two Woods Estate</strong> offers an extraordinary setting for events surrounded by nature and refined elegance. Towering trees, open skies, and beautifully designed outdoor spaces create an atmosphere that feels both intimate and unforgettable. Here, luxury meets the wild beauty of the woodland, allowing your celebration to unfold naturally in one of the most enchanting landscapes in England."
explore:
  heading: "Explore the Venue"
  left:
    heading: "Weddings at Two Woods Estate"
    body: "From intimate ceremonies to full-weekend celebrations, the estate offers a sequence of spaces that flow naturally from vows to dinner and dancing."
    image: "https://www.twowoodsestate.com/images-2024-2/pic02.jpg"
    alt: "Wedding couple at the venue"
    photographer: ""
    link: "/weddings/"
    link_label: "Find out more"
  right:
    heading: "Events at Two Woods Estate"
    body: "Beyond weddings, Two Woods Estate is built for milestone birthdays, brand retreats, private dinners, and seasonal celebrations."
    image: "https://www.twowoodsestate.com/images-2024-2/gallery2/fulls/04.jpg"
    alt: "Styled event setup at the estate"
    photographer: ""
    link: "/events/"
    link_label: "Find out more"
banner:
  image: "/assets/images/forest_wedding.jpg"
  alt: "Forest wedding ceremony"
  photographer: ""
  paragraphs:
    - "With its unfathomable energy and the ethereal peace that descends from the instant you step inside, this spellbinding space will touch your soul."
    - "You won't just see the trees; you will feel them."
    - "Maybe you will pause to take a breath before starting down the aisle as dappled light spills through the trees and nature's very own orchestra accompanies your chosen wedding music. Walk a little further and you will reach your guests gathered before the ceremonial pagoda."
    - "These are once-in-a-lifetime memories that no one will forget but right now this is your moment to cherish with your family and friends, and your future is waiting (perhaps a little nervously) under the cover of the pagoda."
