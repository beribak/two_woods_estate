intro:
  heading: "Welcome to Two Woods Estate!"
  body: "Set among quiet woodland and open skies, Two Woods Estate is designed for celebrations that feel both elevated and deeply personal. This placeholder landing experience showcases the style and structure we will continue to refine with your final content, imagery, and booking flow."
explore:
  heading: "Explore the Venue"
  cards:
    - title: "Woodland Ceremony"
      description: "A naturally beautiful aisle framed by towering trees and soft light."
      image: "https://images.unsplash.com/photo-1636005427257-bb93ec6bc6d2?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt: "Ceremony setup in the woods"
    - title: "Evening Reception"
      description: "Warm textures, candlelight, and room for dining, speeches, and dancing."
      image: "https://images.unsplash.com/photo-1469371670807-013ccf25f16a?auto=format&fit=crop&w=1200&q=80"
      alt: "Elegant reception space"
    - title: "Terrace Dining"
      description: "Long-table moments and sunset toasts with panoramic countryside views."
      image: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1200&q=80"
      alt: "Outdoor terrace dinner"
    - title: "Late Night Celebration"
      description: "Celebrate into the evening with ambient lighting and unforgettable energy."
      image: "https://images.unsplash.com/photo-1478146896981-b80fe463b330?auto=format&fit=crop&w=1200&q=80"
      alt: "Celebration under string lights"
