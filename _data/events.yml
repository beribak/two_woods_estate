banner:
  image: "/assets/images/forest_wedding.jpg"
  alt: "Forest wedding ceremony"
  photographer: ""
  paragraphs:
    - "With its unfathomable energy and the ethereal peace that descends from the instant you step inside, this spellbinding space will touch your soul."
    - "You won't just see the trees; you will feel them."
    - "Maybe you will pause to take a breath before starting down the aisle as dappled light spills through the trees and nature's very own orchestra accompanies your chosen wedding music. Walk a little further and you will reach your guests gathered before the ceremonial pagoda."
    - "These are once-in-a-lifetime memories that no one will forget but right now this is your moment to cherish with your family and friends, and your future is waiting (perhaps a little nervously) under the cover of the pagoda."
