intro:
  heading: "Events at Two Woods Estate"
  paragraphs:
    - "Beyond weddings, Two Woods Estate is built for milestone birthdays, brand retreats, private dinners, and seasonal celebrations."
    - "Our team can shape each event around your timeline, guest journey, and preferred atmosphere, from relaxed daytime gatherings to polished evening experiences."
    - "The spaces below follow the same visual format as the Weddings page and can be adapted with final event-specific content."
