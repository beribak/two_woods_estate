intro:
  heading: "Events at Two Woods Estate"
  paragraphs:
    - "Two Woods Estate is a unique events venue designed to inspire creativity, collaboration, and memorable shared experiences."
    - "Set within private woodland and open countryside, our venue offers a versatile collection of indoor and outdoor spaces ideally suited for everything from strategy days and client entertaining to large-scale team building events and parties."
