---
layout: default
title: About Us
permalink: /about/
---

{% assign about = site.data.about %}

<section class="section about-section animate-on-scroll">
	<div class="about-layout">
		<div class="about-image-wrap">
			<img src="{{ '/assets/images/about_us.jpg' | relative_url }}" alt="About Two Woods Estate" class="about-image" />
		</div>
		<div class="about-copy">
			<h1>{{ about.content.heading }}</h1>
			<p>
				{{ about.content.body }}
			</p>
		</div>
	</div>
</section>
