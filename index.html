---
layout: default
title: Landing
permalink: /
---

{% assign home = site.data.home %}

<section class="hero-video landing-hero animate-on-scroll">
	<video id="video-player-tag" class="video-player-tag" autoplay muted playsinline loop preload="metadata" src="{{ home.hero_video.source }}" controlslist="nodownload"></video>
</section>

<section class="section panel animate-on-scroll">
	<h1>{{ home.intro.heading }}</h1>
	<p>
		{{ home.intro.body }}
	</p>
</section>

<section class="section panel animate-on-scroll">
	<h2>{{ home.explore.heading }}</h2>
	<div class="card-carousel">
		{% for card in home.explore.cards %}
			<article class="card">
				<img src="{{ card.image }}" alt="{{ card.alt }}" />
				<div class="card-body">
					<h3>{{ card.title }}</h3>
					<p>{{ card.description }}</p>
				</div>
			</article>
		{% endfor %}
	</div>
</section>
